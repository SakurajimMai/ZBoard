# Zboard Node Agent Docker Compose
# 部署目录: /root/docker/agent/
# 数据存放: ./data/
# 用法:
#   1. 把本文件保存为 docker-compose.yml
#   2. 把 agent.env.example 复制为 agent.env (与 docker-compose.yml **同目录**)
#   3. docker compose up -d
# env_file 路径相对 docker-compose.yml 所在目录,不要把 agent.env 放进 data/ 子目录。

services:
  agent:
    image: sakurajiamai/zboard-agent:latest
    container_name: zboard-agent
    network_mode: host
    env_file: ./agent.env
    volumes:
      - ./data/runtime.json:/etc/zboard-agent/runtime.json
      - ./data/agent:/var/lib/zboard-agent
      # 挂载 Xray 或 sing-box 二进制（根据实际路径调整）
      - /usr/local/bin/xray:/usr/local/bin/xray:ro
      # 如果用 sing-box，取消下面注释：
      # - /usr/local/bin/sing-box:/usr/local/bin/sing-box:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
