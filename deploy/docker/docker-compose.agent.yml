# Zboard Node Agent Docker Compose
# 部署目录: /root/docker/agent/
# 数据存放: ./data/
# 用法:
#   1. 把本文件保存为 docker-compose.yml
#   2. 把 agent.env.example 复制为 agent.env (与 docker-compose.yml **同目录**)
#   3. docker compose up -d
# env_file 路径相对 docker-compose.yml 所在目录,不要把 agent.env 放进 data/ 子目录。

services:
  agent:
    image: sakurajiamai/zboard-agent:latest
    container_name: zboard-agent
    network_mode: host
    env_file: ./agent.env
    volumes:
      # 挂目录而非文件,避免 Docker 把不存在的 runtime.json 创建成目录的陷阱
      - ./data/etc:/etc/zboard-agent
      - ./data/agent:/var/lib/zboard-agent
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
