services:
  api-server:
    build:
      context: ../../apps/api-server
      dockerfile: Dockerfile
    container_name: zboard-api-server
    env_file:
      - ../env/api.env
    ports:
      - "3000:3000"
    volumes:
      - zboard_api_data:/data
      - zboard_api_backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

volumes:
  zboard_api_data:
  zboard_api_backups:
