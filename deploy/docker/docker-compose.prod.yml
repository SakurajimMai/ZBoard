# Zboard 控制面 Docker Compose
# 部署目录: /root/docker/zboard/
# 数据存放: ./data/
# 用法: docker compose up -d

services:
  api:
    image: sakurajiamai/zboard-api:latest
    container_name: zboard-api
    env_file: ./api.env
    ports:
      - "3000:3000"
    volumes:
      - ./data/api:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  frontend:
    image: sakurajiamai/zboard-frontend:latest
    container_name: zboard-frontend
    environment:
      # 浏览器端 API 基址。
      # 留空(推荐):前端走同源 /api/*,由 Next.js rewrites 反代到 API_INTERNAL_URL。
      #   适合 CDN / 反向代理场景:CDN 只代理 80/443 即可,无需暴露 :3000。
      # 显式设置:用于独立 API 子域名(如 https://api.example.com),需在 api.env
      #   的 ZBOARD_CORS_ORIGINS 里加上前端域名。
      - NEXT_PUBLIC_API_URL=
      # 服务端反代目标(容器间用 compose 服务名 api 即可访问)
      - API_INTERNAL_URL=http://api:3000
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
