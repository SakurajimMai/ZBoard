# Zboard 控制面 Docker Compose
# 使用 DockerHub 预构建镜像，无需本地编译
# 用法: docker compose up -d

services:
  api:
    image: sakurajiamai/zboard-api:latest
    container_name: zboard-api
    env_file: ./api.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  frontend:
    image: sakurajiamai/zboard-frontend:latest
    container_name: zboard-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
